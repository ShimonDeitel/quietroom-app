name: Quietroom
options:
  bundleIdPrefix: com.shimondeitel.noiselog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Quietroom:
    type: application
    platform: iOS
    sources:
      - path: Quietroom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.noiselog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Quietroom/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  QuietroomTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: QuietroomTests
      - path: Quietroom.storekit
    dependencies:
      - target: Quietroom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.noiselog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  QuietroomUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: QuietroomUITests
    dependencies:
      - target: Quietroom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.noiselog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Quietroom:
    build:
      targets:
        Quietroom: all
        QuietroomTests: [test]
        QuietroomUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Quietroom.storekit
    test:
      config: Debug
      storeKitConfiguration: Quietroom.storekit
      targets:
        - QuietroomTests
        - QuietroomUITests
    archive:
      config: Release
